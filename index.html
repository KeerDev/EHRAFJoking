<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Joking Relations — HRAF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0ede6;overflow:hidden}
/* ── header ── */
#hdr{
  display:flex;align-items:center;flex-wrap:wrap;gap:10px 20px;
  padding:11px 20px;background:#fff;border-bottom:1px solid #ddd;
  position:relative;z-index:5;
}
#ttl h2{font-size:16px;font-weight:700;letter-spacing:-.3px;color:#111}
#ttl .sub{font-size:11px;color:#888;margin-top:2px}
#fwrap{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#fwrap > span{font-size:10px;font-weight:700;letter-spacing:.9px;color:#aaa;text-transform:uppercase}
#btns{display:flex;gap:7px;flex-wrap:wrap}
.rbtn{
  padding:4px 13px;border-radius:20px;border:2px solid;
  font-size:11px;font-weight:600;cursor:pointer;
  transition:background .15s,color .15s;
}
.rbtn:hover{filter:brightness(1.08)}
/* ── canvas ── */
#wrap{position:relative;width:100%;height:calc(100vh - 53px)}
svg#g{width:100%;height:100%;cursor:grab}
svg#g:active{cursor:grabbing}
/* ── links ── */
.link{stroke-opacity:.55;transition:stroke-opacity .15s,stroke-width .15s}
.link.lit{stroke-opacity:1 !important;stroke-width:2.5px !important}
.link.dim{stroke-opacity:.04 !important}
/* ── nodes ── */
.ngrp{cursor:pointer}
.ngrp circle{stroke-width:2;transition:opacity .15s}
.ngrp text{pointer-events:none;font-weight:700}
.ngrp.dim circle,.ngrp.dim text{opacity:.1}
/* ── tooltip ── */
#tip{
  position:absolute;display:none;pointer-events:none;
  background:rgba(255,255,255,.97);border:1px solid #ccc;border-radius:7px;
  padding:8px 12px;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.13);
  max-width:220px;z-index:20;line-height:1.4;
}
#tip b{display:block;margin-bottom:2px;font-size:13px;color:#111}
#tip span{color:#666;font-size:11px}
/* ── legend ── */
#leg{
  position:absolute;bottom:14px;left:14px;
  background:rgba(255,255,255,.93);border:1px solid #ddd;
  border-radius:8px;padding:11px 14px;font-size:11px;
  box-shadow:0 1px 6px rgba(0,0,0,.08);line-height:1.5;
}
#leg h4{font-size:9.5px;text-transform:uppercase;letter-spacing:.9px;color:#aaa;margin-bottom:8px}
.li{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.li:last-child{margin-bottom:0}
.dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.18)}
.arrsym{font-size:13px;color:#555;line-height:1;letter-spacing:-2px}
.grey{color:#999;font-size:10px;max-width:140px}
/* ── instructions ── */
#instr{
  position:absolute;bottom:14px;right:14px;
  background:rgba(255,255,255,.88);border:1px solid #ddd;
  border-radius:8px;padding:9px 13px;font-size:10.5px;color:#777;
  box-shadow:0 1px 6px rgba(0,0,0,.07);line-height:1.7;
}
</style>
</head>
<body>

<div id="hdr">
  <div id="ttl">
    <h2>Joking Relations — HRAF</h2>
    <div class="sub" id="sub">Loading…</div>
  </div>
  <div id="fwrap">
    <span>Regions</span>
    <div id="btns"></div>
  </div>
</div>

<div id="wrap">
  <svg id="g"></svg>
  <div id="tip"></div>

  <div id="leg">
    <h4>Legend</h4>
    <div class="li"><div class="dot" style="background:#3A7DBF"></div>Ethnic group</div>
    <div class="li"><span class="arrsym">&#8646;</span>Mutual joking relation</div>
    <div class="li grey">Node size ∝ number of joking partners</div>
  </div>
  <!--
  <div id="instr">
    <b style="color:#555;font-size:11px">Interact</b><br>
    Click a node → highlight its partners<br>
    Click again or background → deselect<br>
    Drag nodes · Scroll / pinch to zoom
  </div>
    --!>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

e": 1}, {"id": "Ise□emaren tribes", "region": "NorthernAfrica", "degree": 1}, {"id": "Ishaza", "region": "CentralAfrica", "degree": 1}, {"id": "Jola", "region": "WesternAfrica", "degree": 1}, {"id": "Kamberi", "region": "WesternAfrica", "degree": 1}, {"id": "Kanuri", "region": "WesternAfrica", "degree": 2}, {"id": "Kel Azel", "region": "NorthernAfrica", "degree": 1}, {"id": "Konso", "region": "EasternAfrica", "degree": 1}, {"id": "Kpata'ar", "region": "WesternAfrica", "degree": 1}, {"id": "Lozi", "region": "SouthernAfrica", "degree": 1}, {"id": "Luguru", "region": "EasternAfrica", "degree": 5}, {"id": "Maasai", "region": "EasternAfrica", "degree": 2}, {"id": "Macha Oromo", "region": "EasternAfrica", "degree": 1}, {"id": "Mbiriri", "region": "CentralAfrica", "degree": 1}, {"id": "Mbunga", "region": "EasternAfrica", "degree": 2}, {"id": "Mogho", "region": "WesternAfrica", "degree": 1}, {"id": "Mossi", "region": "WesternAfrica", "degree": 2}, {"id": "Ngoni", "region": "EasternAfrica", "degree": 1}, {"id": "Nyakyusa", "region": "EasternAfrica", "degree": 1}, {"id": "Nyamwezi", "region": "EasternAfrica", "degree": 1}, {"id": "Nzima", "region": "WesternAfrica", "degree": 1}, {"id": "Okiek", "region": "EasternAfrica", "degree": 1}, {"id": "Pogoro", "region": "EasternAfrica", "degree": 1}, {"id": "Sakpee", "region": "WesternAfrica", "degree": 1}, {"id": "Samiit", "region": "WesternAfrica", "degree": 1}, {"id": "San", "region": "WesternAfrica", "degree": 2}, {"id": "Serer", "region": "WesternAfrica", "degree": 1}, {"id": "Somono", "region": "WesternAfrica", "degree": 1}, {"id": "Sukuma", "region": "EasternAfrica", "degree": 1}, {"id": "Taita", "region": "EasternAfrica", "degree": 1}, {"id": "Talis", "region": "WesternAfrica", "degree": 1}, {"id": "Tallensi", "region": "WesternAfrica", "degree": 1}, {"id": "Tiv", "region": "WesternAfrica", "degree": 1}, {"id": "Tonga", "region": "SouthernAfrica", "degree": 1}, {"id": "Torrobo", "region": "EasternAfrica", "degree": 1}, {"id": "Wakii", "region": "WesternAfrica", "degree": 1}, {"id": "Wamangi", "region": "EasternAfrica", "degree": 1}, {"id": "Watta", "region": "EasternAfrica", "degree": 6}, {"id": "WoDaaBe", "region": "WesternAfrica", "degree": 2}, {"id": "Yarse", "region": "WesternAfrica", "degree": 1}, {"id": "Zaramo", "region": "EasternAfrica", "degree": 1}, {"id": "Zubiuŋ", "region": "WesternAfrica", "degree": 2}, {"id": "noble Kel □ela Tuareg", "region": "NorthernAfrica", "degree": 1}];
const LINKS   = [{"source": "Abanvra", "target": "Abangombi", "region": "CentralAfrica"}, {"source": "Abauura", "target": "Abangombi", "region": "CentralAfrica"}, {"source": "Arewa", "target": "Adar", "region": "WesternAfrica"}, {"source": "Abangombi", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Abanvra", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Akalinga", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Abangombi", "target": "Akalinga", "region": "CentralAfrica"}, {"source": "Abanvra", "target": "Akalinga", "region": "CentralAfrica"}, {"source": "Ba’are", "target": "Ba’adare", "region": "WesternAfrica"}, {"source": "Baribari", "target": "Ba’adare", "region": "WesternAfrica"}, {"source": "Baduwari", "target": "Bagobiri", "region": "WesternAfrica"}, {"source": "Bakatsine", "target": "Bagobiri", "region": "WesternAfrica"}, {"source": "Bambara", "target": "Bozo", "region": "WesternAfrica"}, {"source": "Watta", "target": "Dime", "region": "EasternAfrica"}, {"source": "Watta", "target": "Dizi", "region": "EasternAfrica"}, {"source": "Bambara", "target": "Dogon", "region": "WesternAfrica"}, {"source": "Bozo", "target": "Dogon", "region": "WesternAfrica"}, {"source": "Baribari", "target": "Fulani", "region": "WesternAfrica"}, {"source": "Bornu", "target": "Fulani", "region": "WesternAfrica"}, {"source": "Tiv", "target": "Fulani", "region": "WesternAfrica"}, {"source": " Katsina", "target": "Gobir", "region": "WesternAfrica"}, {"source": "Ba'ari", "target": "Gorogo", "region": "WesternAfrica"}, {"source": "Zubiuŋ", "target": "Gundaat", "region": "WesternAfrica"}, {"source": "Watta", "target": "Gurage", "region": "EasternAfrica"}, {"source": "Fulani", "target": "Hausa", "region": "WesternAfrica"}, {"source": "Aġuh-en-tehlé", "target": "Ise□emaren tribes", "region": "NorthernAfrica"}, {"source": "Dukawa", "target": "Kamberi", "region": "WesternAfrica"}, {"source": "WoDaaBe", "target": "Kanuri", "region": "WesternAfrica"}, {"source": "Fulani", "target": "Kanuri", "region": "WesternAfrica"}, {"source": "Irawatten", "target": "Kel Azel", "region": "NorthernAfrica"}, {"source": "Watta", "target": "Konso", "region": "EasternAfrica"}, {"source": "Tonga", "target": "Lozi", "region": "SouthernAfrica"}, {"source": "Okiek", "target": "Maasai", "region": "EasternAfrica"}, {"source": "Watta", "target": "Macha Oromo", "region": "EasternAfrica"}, {"source": "Gwari", "target": "Gobir", "region": "WesternAfrica"}, {"source": "Chagga", "target": "Maasai", "region": "EasternAfrica"}, {"source": "Ishaza", "target": "Mbiriri", "region": "CentralAfrica"}, {"source": "Luguru", "target": "Mbunga", "region": "EasternAfrica"}, {"source": "Nyakyusa", "target": "Ngoni", "region": "EasternAfrica"}, {"source": "Aġuh-en-tehlé", "target": "noble Kel □ela Tuareg", "region": "NorthernAfrica"}, {"source": "Luguru", "target": "Nyamwezi", "region": "EasternAfrica"}, {"source": "Ashanti", "target": "Nzima", "region": "WesternAfrica"}, {"source": "Luguru", "target": "Pogoro", "region": "EasternAfrica"}, {"source": "Zubiuŋ", "target": "Sakpee", "region": "WesternAfrica"}, {"source": "Degal", "target": "Samiit", "region": "WesternAfrica"}, {"source": "Mogho", "target": "San", "region": "WesternAfrica"}, {"source": "Mossi", "target": "San", "region": "WesternAfrica"}, {"source": "Jola", "target": "Serer", "region": "WesternAfrica"}, {"source": "Bozo", "target": "Somono", "region": "WesternAfrica"}, {"source": "Chagga", "target": "Taita", "region": "EasternAfrica"}, {"source": "Tallensi", "target": "Talis", "region": "WesternAfrica"}, {"source": "Watta", "target": "Torrobo", "region": "EasternAfrica"}, {"source": "Luguru", "target": "Sukuma", "region": "EasternAfrica"}, {"source": "Kpata'ar", "target": "Wakii", "region": "WesternAfrica"}, {"source": "Wamangi", "target": "Mbunga", "region": "EasternAfrica"}, {"source": "Baribari", "target": "WoDaaBe", "region": "WesternAfrica"}, {"source": "Mossi", "target": "Yarse", "region": "WesternAfrica"}, {"source": "Luguru", "target": "Zaramo", "region": "EasternAfrica"}];
const COLORS  = {"WesternAfrica": "#3A7DBF", "EasternAfrica": "#45A05C", "CentralAfrica": "#D97226", "NorthernAfrica": "#8B5EA8", "SouthernAfrica": "#2BAAB0"};
const REGIONS = ["CentralAfrica", "EasternAfrica", "NorthernAfrica", "SouthernAfrica", "WesternAfrica"];

/* ── subtitle ─────────────────────────────────────────────────────────────── */
document.getElementById("sub").textContent =
  `${NODES.length} ethnic groups · ${LINKS.length} joking relations · ${REGIONS.length} regions`;

/* ── region filter state ─────────────────────────────────────────────────── */
const active = new Set(REGIONS);

/* ── filter buttons ──────────────────────────────────────────────────────── */
const btnsDiv = document.getElementById("btns");
REGIONS.forEach(r => {
  const btn = document.createElement("button");
  btn.className = "rbtn";
  btn.textContent = r.replace(/([A-Z])/g," $1").trim();
  btn.dataset.r = r;
  applyBtnStyle(btn, true);
  btn.onclick = () => {
    const wasOn = active.has(r);
    wasOn ? active.delete(r) : active.add(r);
    applyBtnStyle(btn, !wasOn);
    refreshVisibility();
  };
  btnsDiv.appendChild(btn);
});

function applyBtnStyle(btn, on) {
  const c = COLORS[btn.dataset.r] || "#999";
  btn.style.borderColor = c;
  btn.style.background  = on ? c : "#fff";
  btn.style.color       = on ? "#fff" : c;
}

/* ── SVG + zoom ──────────────────────────────────────────────────────────── */
const svg  = d3.select("#g");
const wrap = document.getElementById("wrap");
let W = wrap.clientWidth, H = wrap.clientHeight;

const root = svg.append("g");
svg.call(
  d3.zoom().scaleExtent([.2, 6])
    .on("zoom", e => root.attr("transform", e.transform))
);

/* ── Arrow markers (per region, end + start-reversed) ───────────────────── */
const defs = svg.append("defs");
Object.entries(COLORS).forEach(([region, color]) => {
  const rid = region.replace(/[^a-z0-9]/gi, "_");

  defs.append("marker")
    .attr("id", "ae_" + rid)
    .attr("viewBox", "0 -5 10 10").attr("refX", 9).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5).attr("orient", "auto")
    .append("path").attr("d", "M0,-4.5L9,0L0,4.5").attr("fill", color);

  defs.append("marker")
    .attr("id", "as_" + rid)
    .attr("viewBox", "0 -5 10 10").attr("refX", 1).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5).attr("orient", "auto-start-reverse")
    .append("path").attr("d", "M0,-4.5L9,0L0,4.5").attr("fill", color);
});

/* ── Node radius scaled by degree ────────────────────────────────────────── */
const maxDeg = d3.max(NODES, d => d.degree);
const rScale = d3.scaleSqrt().domain([1, maxDeg]).range([9, 17]);
const nr = d => rScale(d.degree);

/* ── Region centroid positions (geographic approximation) ────────────────── */
function regionCenters() {
  return {
    "NorthernAfrica": [W * 0.50, H * 0.14],
    "WesternAfrica":  [W * 0.22, H * 0.50],
    "CentralAfrica":  [W * 0.46, H * 0.58],
    "EasternAfrica":  [W * 0.74, H * 0.44],
    "SouthernAfrica": [W * 0.68, H * 0.80],
  };
}

/* ── Background region labels ────────────────────────────────────────────── */
const bgLayer = root.append("g").attr("class", "bg-labels");
function drawBgLabels() {
  bgLayer.selectAll("text").remove();
  const rc = regionCenters();
  Object.entries(rc).forEach(([region, [cx, cy]]) => {
    bgLayer.append("text")
      .attr("x", cx).attr("y", cy)
      .attr("text-anchor", "middle")
      .attr("fill", COLORS[region] || "#999")
      .attr("opacity", 0.09)
      .attr("font-size", "52px")
      .attr("font-weight", "800")
      .attr("font-family", "'Helvetica Neue',Arial,sans-serif")
      .attr("letter-spacing", "2px")
      .text(region.replace(/([A-Z])/g, " $1").trim().toUpperCase());
  });
}
//drawBgLabels();

/* ── Force simulation ────────────────────────────────────────────────────── */
function buildForces() {
  const rc = regionCenters();
  sim
    .force("link",    d3.forceLink(LINKS).id(d => d.id).distance(62).strength(.5))
    .force("charge",  d3.forceManyBody().strength(-110))
    .force("collide", d3.forceCollide().radius(d => nr(d) + 14))
    .force("x",       d3.forceX(d => rc[d.region][0]).strength(.38))
    .force("y",       d3.forceY(d => rc[d.region][1]).strength(.38));
}

const sim = d3.forceSimulation(NODES);
buildForces();

/* ── Draw links ──────────────────────────────────────────────────────────── */
const linkSel = root.append("g")
  .selectAll("line").data(LINKS).join("line")
  .attr("class", "link")
  .attr("stroke", d => COLORS[d.region] || "#999")
  .attr("stroke-width", 1.8)
  .each(function(d) {
    const rid = d.region.replace(/[^a-z0-9]/gi, "_");
    d3.select(this)
      .attr("marker-end",   `url(#ae_${rid})`)
      .attr("marker-start", `url(#as_${rid})`);
  });

/* ── Draw nodes ──────────────────────────────────────────────────────────── */
const nodeSel = root.append("g")
  .selectAll(".ngrp").data(NODES).join("g").attr("class", "ngrp")
  .call(
    d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on("click",     nodeClick)
  .on("mouseover", showTip)
  .on("mousemove", moveTip)
  .on("mouseout",  hideTip);

nodeSel.append("circle")
  .attr("r",            nr)
  .attr("fill",         d => COLORS[d.region] || "#999")
  .attr("stroke",       d => d3.color(COLORS[d.region] || "#999").darker(.55))
  .attr("fill-opacity", .88);

/* Label below the circle */
nodeSel.append("text")
  .text(d => d.id)
  .attr("text-anchor", "middle")
  .attr("y", d => nr(d) + 9)          /* sit just below circle edge */
  .attr("fill", "#222")
  .attr("fill-opacity", .85)
  .style("font-size", "8.5px")
  .style("font-weight", "600")
  .style("paint-order", "stroke")     /* white halo for legibility */
  .style("stroke", "#f0ede6")
  .style("stroke-width", "2.5px")
  .style("stroke-linejoin", "round");

/* ── Tooltip ─────────────────────────────────────────────────────────────── */
const tip = document.getElementById("tip");
function showTip(e, d) {
  const reg = d.region.replace(/([A-Z])/g, " $1").trim();
  tip.innerHTML = `<b>${d.id}</b><span>${reg} &middot; ${d.degree} joking relation${d.degree !== 1 ? "s" : ""}</span>`;
  tip.style.display = "block";
}
function moveTip(e) {
  tip.style.left = (e.offsetX + 16) + "px";
  tip.style.top  = (e.offsetY - 42) + "px";
}
function hideTip() { tip.style.display = "none"; }

/* ── Click-to-highlight ──────────────────────────────────────────────────── */
let sel = null;

function sid(l) { return typeof l.source === "object" ? l.source.id : l.source; }
function tid(l) { return typeof l.target === "object" ? l.target.id : l.target; }

function neighbors(id) {
  const s = new Set();
  LINKS.forEach(l => {
    if (sid(l) === id) s.add(tid(l));
    if (tid(l) === id) s.add(sid(l));
  });
  return s;
}

function nodeClick(e, d) {
  e.stopPropagation();
  if (sel === d.id) { clearSel(); return; }
  sel = d.id;
  const nbrs = neighbors(d.id);
  nodeSel.classed("dim", n => n.id !== d.id && !nbrs.has(n.id));
  linkSel
    .classed("dim", l => sid(l) !== d.id && tid(l) !== d.id)
    .classed("lit", l => sid(l) === d.id || tid(l) === d.id);
}

svg.on("click", clearSel);

function clearSel() {
  sel = null;
  nodeSel.classed("dim", false);
  linkSel.classed("dim", false).classed("lit", false);
  refreshVisibility();
}

/* ── Region visibility ───────────────────────────────────────────────────── */
function refreshVisibility() {
  const visNodes = new Set();
  LINKS.forEach(l => {
    if (active.has(l.region)) {
      visNodes.add(sid(l));
      visNodes.add(tid(l));
    }
  });
  linkSel.style("display", d => active.has(d.region) ? null : "none");
  nodeSel.style("display", d => visNodes.has(d.id)   ? null : "none");
}

/* ── Simulation tick ─────────────────────────────────────────────────────── */
sim.on("tick", () => {
  linkSel.each(function(d) {
    const dx   = d.target.x - d.source.x;
    const dy   = d.target.y - d.source.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const rs   = nr(d.source) + 2;
    const rt   = nr(d.target) + 2;
    d3.select(this)
      .attr("x1", d.source.x + (dx / dist) * rs)
      .attr("y1", d.source.y + (dy / dist) * rs)
      .attr("x2", d.target.x - (dx / dist) * rt)
      .attr("y2", d.target.y - (dy / dist) * rt);
  });
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

/* ── Resize ──────────────────────────────────────────────────────────────── */
window.addEventListener("resize", () => {
  W = wrap.clientWidth; H = wrap.clientHeight;
  //drawBgLabels();
  buildForces();
  sim.alpha(.5).restart();
});
</script>
</body>
