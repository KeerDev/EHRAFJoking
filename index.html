<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Joking Relations — HRAF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0ede6;overflow:hidden}

#hdr{
  display:flex;align-items:center;flex-wrap:wrap;gap:10px 20px;
  padding:11px 20px;background:#fff;border-bottom:1px solid #ddd;z-index:5;position:relative;
}
#ttl h2{font-size:16px;font-weight:700;letter-spacing:-.3px;color:#111}
#ttl .sub{font-size:11px;color:#888;margin-top:2px}
#fwrap{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#fwrap>span{font-size:10px;font-weight:700;letter-spacing:.9px;color:#aaa;text-transform:uppercase}
#btns{display:flex;gap:7px;flex-wrap:wrap}
.rbtn{
  padding:4px 13px;border-radius:20px;border:2px solid;
  font-size:11px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;
}
.rbtn:hover{filter:brightness(1.08)}

#wrap{position:relative;width:100%;height:calc(100vh - 53px)}
svg#g{width:100%;height:100%;cursor:grab}
svg#g:active{cursor:grabbing}

.zone-bg{fill-opacity:.05;stroke:none;cursor:grab}
.zone-bg:active{cursor:grabbing}
.zone-label{pointer-events:none;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}

.hull{fill-opacity:.08;stroke-opacity:.3;stroke-width:1.5px;stroke-dasharray:4 3}

.link{fill:none;stroke-opacity:.50;transition:stroke-opacity .2s,stroke-width .2s}
.link.lit{stroke-opacity:1!important;stroke-width:3px!important}
.link.dim{stroke-opacity:.05!important}

.ngrp{cursor:pointer}
.ngrp circle{stroke-width:2;transition:opacity .15s}
.ngrp text{pointer-events:none;font-weight:600}
.ngrp.dim circle,.ngrp.dim text{opacity:.1}

#tip{
  position:absolute;display:none;pointer-events:none;
  background:rgba(255,255,255,.97);border:1px solid #ccc;border-radius:7px;
  padding:8px 12px;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.13);
  max-width:220px;z-index:20;line-height:1.5;
}
#tip b{display:block;margin-bottom:2px;font-size:13px;color:#111}
#tip span{color:#666;font-size:11px}

#leg{
  position:absolute;bottom:14px;left:14px;
  background:rgba(255,255,255,.93);border:1px solid #ddd;
  border-radius:8px;padding:11px 14px;font-size:11px;
  box-shadow:0 1px 6px rgba(0,0,0,.08);line-height:1.6;
}
#leg h4{font-size:9.5px;text-transform:uppercase;letter-spacing:.9px;color:#aaa;margin-bottom:8px}
.li{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.li:last-child{margin-bottom:0}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.18)}
</style>
</head>
<body>

<div id="hdr">
  <div id="ttl">
    <h2>Joking Relations — HRAF</h2>
    <div class="sub" id="sub">Loading…</div>
  </div>
  <div id="fwrap">
    <span>Regions</span>
    <div id="btns"></div>
  </div>
</div>

<div id="wrap">
  <svg id="g"></svg>
  <div id="tip"></div>
  <div id="leg">
    <h4>Legend</h4>
    <div class="li">
      <span style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px"></span>
      Mutual joking relation
    </div>
    <div class="li">
      <span style="display:inline-block;width:20px;height:14px;border-radius:4px;
                   background:rgba(0,0,0,.06);border:1.5px dashed #aaa"></span>
      Joking cluster
    </div>
    <div class="li" style="color:#999;font-size:10px;max-width:150px">
      Node size ∝ number of joking partners
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>

ernAfrica", "degree": 5, "component": 0}, {"id": "Gobir", "region": "WesternAfrica", "degree": 2, "component": 7}, {"id": "Gorogo", "region": "WesternAfrica", "degree": 1, "component": 12}, {"id": "Gundaat", "region": "WesternAfrica", "degree": 1, "component": 8}, {"id": "Gurage", "region": "EasternAfrica", "degree": 1, "component": 1}, {"id": "Gwari", "region": "WesternAfrica", "degree": 1, "component": 7}, {"id": "Hausa", "region": "WesternAfrica", "degree": 1, "component": 0}, {"id": "Irawatten", "region": "NorthernAfrica", "degree": 1, "component": 14}, {"id": "Ise□emaren tribes", "region": "NorthernAfrica", "degree": 1, "component": 9}, {"id": "Ishaza", "region": "CentralAfrica", "degree": 1, "component": 16}, {"id": "Jola", "region": "WesternAfrica", "degree": 1, "component": 20}, {"id": "Kamberi", "region": "WesternAfrica", "degree": 1, "component": 13}, {"id": "Kanuri", "region": "WesternAfrica", "degree": 2, "component": 0}, {"id": "Kel Azel", "region": "NorthernAfrica", "degree": 1, "component": 14}, {"id": "Konso", "region": "EasternAfrica", "degree": 1, "component": 1}, {"id": "Kpata'ar", "region": "WesternAfrica", "degree": 1, "component": 22}, {"id": "Lozi", "region": "SouthernAfrica", "degree": 1, "component": 15}, {"id": "Luguru", "region": "EasternAfrica", "degree": 5, "component": 2}, {"id": "Maasai", "region": "EasternAfrica", "degree": 2, "component": 5}, {"id": "Macha Oromo", "region": "EasternAfrica", "degree": 1, "component": 1}, {"id": "Mbiriri", "region": "CentralAfrica", "degree": 1, "component": 16}, {"id": "Mbunga", "region": "EasternAfrica", "degree": 2, "component": 2}, {"id": "Mossi", "region": "WesternAfrica", "degree": 2, "component": 10}, {"id": "Ngoni", "region": "EasternAfrica", "degree": 1, "component": 17}, {"id": "Nyakyusa", "region": "EasternAfrica", "degree": 1, "component": 17}, {"id": "Nyamwezi", "region": "EasternAfrica", "degree": 1, "component": 2}, {"id": "Nzima", "region": "WesternAfrica", "degree": 1, "component": 18} const LINKS       = [{"source": "Abanvra", "target": "Abangombi", "region": "CentralAfrica"}, {"source": "Abauura", "target": "Abangombi", "region": "CentralAfrica"}, {"source": "Arewa", "target": "Adar", "region": "WesternAfrica"}, {"source": "Abangombi", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Abanvra", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Akalinga", "target": "Agiti", "region": "CentralAfrica"}, {"source": "Abangombi", "target": "Akalinga", "region": "CentralAfrica"}, {"source": "Abanvra", "target": "Akalinga", "region": "CentralAfrica"}, {"source": "Ba’are", "target": "Ba’adare", "region": "WesternAfrica"}, {"source": "Baribari", "target": "Ba’adare", "region": "WesternAfrica"}, {"source": "Baduwari", "target": "Bagobiri", "region": "WesternAfrica"}, {"source": "Bakatsine", "target": "Bagobiri", "region": "WesternAfrica"}, {"source": "Bambara", "target": "Bozo", "region": "WesternAfrica"}, {"source": "Watta", "target": "Dime", "region": "EasternAfrica"}, {"source": "Watta", "target": "Dizi", "region": "EasternAfrica"}, {"source": "Bambara", "target": "Dogon", "region": "WesternAfrica"}, {"source": "Bozo", "target": "Dogon", "region": "WesternAfrica"}, {"source": "Baribari", "target": "Fulani", "region": "WesternAfrica"}, {"source": "Bornu", "target": "Fulani", "region": "WesternAfrica"}, {"source": "Tiv", "target": "Fulani", "region": "WesternAfrica"}, {"source": " Katsina", "target": "Gobir", "region": "WesternAfrica"}, {"source": "Ba'ari", "target": "Gorogo", "region": "WesternAfrica"}, {"source": "Zubiuŋ", "target": "Gundaat", "region": "WesternAfrica"}, {"source": "Watta", "target": "Gurage", "region": "EasternAfrica"}, {"source": "Fulani", "target": "Hausa", "region": "WesternAfrica"}, {"source": "Aġuh-en-tehlé", "target": "Ise□emaren tribes", "region": "NorthernAfrica"}, {"source": "Dukawa", "target": "Kamberi", "region": "WesternAfrica"}, {"source": "WoDaaBe", "target": "Kanuri", "region": "WesternAfrica"}, {"source": "Fulani", "target": "Kanuri", "region": "WesternAfrica"}, {"source": "Irawatten", "target": "Kel Azel", "region": "NorthernAfrica"}, {"source": "Watta", "target": "Konso", "region": "EasternAfrica"}, {"source": "Tonga", "target": "Lozi", "region": "SouthernAfrica"}, {"source": "Okiek", "target": "Maasai", "region": "EasternAfrica"}, {"source": "Watta", "target": "Macha Oromo", "region": "EasternAfrica"}, {"source": "Gwari", "target": "Gobir", "region": "WesternAfrica"}, {"source": "Chagga", "target": "Maasai", "region": "EasternAfrica"}, {"source": "Ishaza", "target": "Mbiriri", "region": "CentralAfrica"}, {"source": "Luguru", "target": "Mbunga", "region": "EasternAfrica"}, {"source": "Nyakyusa", "target": "Ngoni", "region": "EasternAfrica"}, {"source": "Aġuh-en-tehlé", "target": "noble Kel □ela Tuareg", "region": "NorthernAfrica"}, {"source": "Luguru", "target": "Nyamwezi", "region": "EasternAfrica"}, {"source": "Ashanti", "target": "Nzima", "region": "WesternAfrica"}, {"source": "Luguru", "target": "Pogoro", "region": "EasternAfrica"}, {"source": "Zubiuŋ", "target": "Sakpee", "region": "WesternAfrica"}, {"source": "Degal", "target": "Samiit", "region": "WesternAfrica"}, {"source": "Mossi", "target": "San", "region": "WesternAfrica"}, {"source": "Jola", "target": "Serer", "region": "WesternAfrica"}, {"source": "Bozo", "target": "Somono", "region": "WesternAfrica"}, {"source": "Chagga", "target": "Taita", "region": "EasternAfrica"}, {"source": "Tallensi", "target": "Talis", "region": "WesternAfrica"}, {"source": "Watta", "target": "Torrobo", "region": "EasternAfrica"}, {"source": "Luguru", "target": "Sukuma", "region": "EasternAfrica"}, {"source": "Kpata'ar", "target": "Wakii", "region": "WesternAfrica"}, {"source": "Wamangi", "target": "Mbunga", "region": "EasternAfrica"}, {"source": "Baribari", "target": "WoDaaBe", "region": "WesternAfrica"}, {"source": "Mossi", "target": "Yarse", "region": "WesternAfrica"}, {"source": "Luguru", "target": "Zaramo", "region": "EasternAfrica"}];
const COLORS      = {"WesternAfrica": "#3A7DBF", "EasternAfrica": "#45A05C", "CentralAfrica": "#D97226", "NorthernAfrica": "#8B5EA8", "SouthernAfrica": "#2BAAB0"};
const REGIONS     = ["CentralAfrica", "EasternAfrica", "NorthernAfrica", "SouthernAfrica", "WesternAfrica"];
const COMP_SIZES  = [9, 7, 7, 5, 4, 4, 3, 3, 3, 3, 3, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2];    // [size0, size1, …] largest first
const COMP_REGIONS= ["WesternAfrica", "EasternAfrica", "EasternAfrica", "CentralAfrica", "WesternAfrica", "EasternAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica", "NorthernAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica", "NorthernAfrica", "SouthernAfrica", "CentralAfrica", "EasternAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica", "WesternAfrica"];  // [region0, region1, …]

document.getElementById("sub").textContent =
  `${NODES.length} ethnic groups · ${LINKS.length} joking relations · ${COMP_SIZES.length} clusters`;

/* ── region filter ───────────────────────────────────────────────────────── */
const active = new Set(REGIONS);
const btnsDiv = document.getElementById("btns");
REGIONS.forEach(r => {
  const btn = document.createElement("button");
  btn.className = "rbtn";
  btn.textContent = r.replace(/([A-Z])/g," $1").trim();
  btn.dataset.r = r;
  styleBtn(btn, true);
  btn.onclick = () => {
    const wasOn = active.has(r);
    wasOn ? active.delete(r) : active.add(r);
    styleBtn(btn, !wasOn);
    refreshVis();
  };
  btnsDiv.appendChild(btn);
});
function styleBtn(btn, on) {
  const c = COLORS[btn.dataset.r] || "#999";
  btn.style.borderColor = c;
  btn.style.background  = on ? c : "#fff";
  btn.style.color       = on ? "#fff" : c;
}

/* ── SVG + zoom ──────────────────────────────────────────────────────────── */
const svg  = d3.select("#g");
const wrap = document.getElementById("wrap");
let W = wrap.clientWidth, H = wrap.clientHeight;
const root = svg.append("g");
svg.call(d3.zoom().scaleExtent([.15, 6]).on("zoom", e => root.attr("transform", e.transform)));

/* ── node radius ─────────────────────────────────────────────────────────── */
const maxDeg = d3.max(NODES, d => d.degree);
const rScale = d3.scaleSqrt().domain([1, maxDeg]).range([8, 16]);
const nr = d => rScale(d.degree);

/* ── zone background + label layer ──────────────────────────────────────── */
const zoneLayer = root.append("g");

/* Redraws a single link path — shared by tick and zone-drag */
function redrawLink(el, d) {
  const sx=d.source.x, sy=d.source.y, tx=d.target.x, ty=d.target.y;
  const ddx=tx-sx, ddy=ty-sy, dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  const rs=nr(d.source)+2, rt=nr(d.target)+2;
  const x1=sx+(ddx/dist)*rs, y1=sy+(ddy/dist)*rs;
  const x2=tx-(ddx/dist)*rt, y2=ty-(ddy/dist)*rt;
  const bend=Math.min(dist*.22,18);
  const mx=(x1+x2)/2-(ddy/dist)*bend;
  const my=(y1+y2)/2+(ddx/dist)*bend;
  d3.select(el).attr("d",`M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
}

/* ── zone drag — moves an entire region together ─────────────────────────── */
const zoneDrag = d3.drag()
  .on("start", function(event) {
    event.sourceEvent.stopPropagation();   /* prevent zoom/pan while dragging */
    const region = d3.select(this).attr("data-region");
    this._zd = { region, ox: event.x, oy: event.y };
    /* freeze every node in this region so the force sim doesn't fight us */
    NODES.forEach(d => {
      if (COMP_REGIONS[d.component] === region) { d.fx = d.x; d.fy = d.y; }
    });
    sim.stop();
  })
  .on("drag", function(event) {
    const { region } = this._zd;
    const dx = event.x - this._zd.ox;
    const dy = event.y - this._zd.oy;
    this._zd.ox = event.x;
    this._zd.oy = event.y;

    /* shift regionInfo */
    regionInfo[region].cx += dx;
    regionInfo[region].cy += dy;

    /* shift every cluster centroid belonging to this region */
    COMP_REGIONS.forEach((r, cid) => {
      if (r === region && compCentroids[cid]) {
        compCentroids[cid][0] += dx;
        compCentroids[cid][1] += dy;
      }
    });

    /* shift every node in this region */
    NODES.forEach(d => {
      if (COMP_REGIONS[d.component] === region) {
        d.x += dx; d.y += dy;
        d.fx = d.x; d.fy = d.y;
      }
    });

    /* update zone circle + label IN PLACE (don't call drawZones — that would
       destroy the element mid-drag and break D3's drag state)              */
    const info = regionInfo[region];
    zoneLayer.selectAll(`.zone-bg[data-region="${region}"]`)
      .attr("cx", info.cx).attr("cy", info.cy);
    zoneLayer.selectAll(`.zone-label[data-region="${region}"]`)
      .attr("x", info.cx).attr("y", info.cy - info.r + 18);

    /* update cluster hulls, nodes, and links */
    updateHulls();
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    linkSel.each(function(d) { redrawLink(this, d); });
  })
  .on("end", function() {
    const { region } = this._zd;
    /* release pin so nodes can settle */
    NODES.forEach(d => {
      if (COMP_REGIONS[d.component] === region) { d.fx = null; d.fy = null; }
    });
    /* update force targets to the new positions */
    sim.force("x", d3.forceX(d => compCentroids[d.component][0]).strength(.70));
    sim.force("y", d3.forceY(d => compCentroids[d.component][1]).strength(.70));
    sim.alpha(0.25).restart();
    delete this._zd;
  });

function drawZones() {
  zoneLayer.selectAll("*").remove();
  Object.entries(regionInfo).forEach(([region, info]) => {
    const col = COLORS[region] || "#999";
    zoneLayer.append("circle")
      .attr("class", "zone-bg")
      .attr("data-region", region)
      .attr("cx", info.cx).attr("cy", info.cy)
      .attr("r",  info.r)
      .attr("fill", col).attr("fill-opacity", .07)
      .call(zoneDrag);   /* ← make each zone circle draggable */
    zoneLayer.append("text")
      .attr("class", "zone-label")
      .attr("data-region", region)
      .attr("x", info.cx).attr("y", info.cy - info.r + 18)
      .attr("text-anchor", "middle")
      .attr("fill", col).attr("fill-opacity", .35)
      .attr("font-size", "10px")
      .attr("font-family", "'Helvetica Neue',Arial,sans-serif")
      .text(region.replace(/([A-Z])/g, " $1").trim().toUpperCase());
  });
}

/* ── two-level circle packing ────────────────────────────────────────────── */
/* Level 1: pack clusters within each region using d3.packSiblings            */
/* Level 2: pack the region blobs against each other so they never overlap    */
function compR(n) { return Math.max(30, n * 11); }

/* Gap added around each region's enclosing circle before region-level pack. */
const REGION_GAP = 40;

/* Preferred draw order controls the spiral when d3.packSiblings runs on
   region circles — larger regions tend to end up near the centre.
   Western is biggest (14 clusters) so it goes first.                        */
const REGION_ORDER = [
  "WesternAfrica", "EasternAfrica", "NorthernAfrica",
  "CentralAfrica", "SouthernAfrica"
];

let compCentroids = {};  /* { compId: [x, y] }          */
let regionInfo    = {};  /* { region: { cx, cy, r } }   */

function packAll() {
  const byRegion = {};
  COMP_REGIONS.forEach((region, cid) => {
    (byRegion[region] = byRegion[region] || []).push(cid);
  });

  /* ── Level 1: pack clusters within each region ── */
  const regionPacks = {};   /* { region: { circles, enc } } */
  Object.entries(byRegion).forEach(([region, compIds]) => {
    const sorted  = [...compIds].sort((a, b) => COMP_SIZES[b] - COMP_SIZES[a]);
    const circles = sorted.map(cid => ({ id: cid, r: compR(COMP_SIZES[cid]) + 14 }));
    d3.packSiblings(circles);
    const enc = d3.packEnclose(circles);
    regionPacks[region] = { circles, enc };
  });

  /* ── Level 2: pack region blobs so they don't overlap ── */
  const regionCircles = REGION_ORDER
    .filter(r => regionPacks[r])
    .map(r => ({ id: r, r: regionPacks[r].enc.r + REGION_GAP }));

  d3.packSiblings(regionCircles);
  const totalEnc = d3.packEnclose(regionCircles);

  /* Centre the whole layout on the canvas */
  const canvasCx = W / 2;
  const canvasCy = H / 2;

  compCentroids = {};
  regionInfo    = {};

  regionCircles.forEach(rc => {
    const pack   = regionPacks[rc.id];
    const regCx  = canvasCx + rc.x - totalEnc.x;
    const regCy  = canvasCy + rc.y - totalEnc.y;

    /* Store zone circle (without the gap padding) for drawZones */
    regionInfo[rc.id] = {
      cx: regCx,
      cy: regCy,
      r:  pack.enc.r + 24   /* 24 px breathing room around cluster group */
    };

    /* Place each cluster centroid relative to this region's centre */
    pack.circles.forEach(c => {
      compCentroids[c.id] = [
        regCx + c.x - pack.enc.x,
        regCy + c.y - pack.enc.y
      ];
    });
  });
}

packAll();
drawZones();

/* ── pre-position nodes in circles within their component ────────────────── */
function prePosition() {
  const byComp = {};
  NODES.forEach(d => { (byComp[d.component] = byComp[d.component] || []).push(d); });
  Object.entries(byComp).forEach(([cid, nodes]) => {
    const [cx, cy] = compCentroids[+cid];
    const n = nodes.length;
    const r = n === 1 ? 0 : Math.max(14, n * 8);
    nodes.forEach((d, i) => {
      d.x = cx + r * Math.cos((2*Math.PI*i/n) - Math.PI/2);
      d.y = cy + r * Math.sin((2*Math.PI*i/n) - Math.PI/2);
    });
  });
}
prePosition();

/* ── hull layer (circles per cluster) ───────────────────────────────────── */
const hullLayer = root.append("g");
function updateHulls() {
  const byComp = {};
  NODES.forEach(d => { (byComp[d.component] = byComp[d.component] || []).push(d); });
  hullLayer.selectAll(".hull").remove();
  Object.entries(byComp).forEach(([cid, nodes]) => {
    if (nodes.length < 2) return;
    const regionCounts = {};
    nodes.forEach(d => { regionCounts[d.region] = (regionCounts[d.region]||0)+1; });
    const topRegion = Object.entries(regionCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const col = COLORS[topRegion] || "#999";
    /* use bounding circle (centroid + max distance) so shape stays circular */
    const cx = d3.mean(nodes, d => d.x);
    const cy = d3.mean(nodes, d => d.y);
    const r  = d3.max(nodes, d => Math.sqrt((d.x-cx)**2+(d.y-cy)**2)) + 22;
    hullLayer.append("circle")
      .attr("class","hull")
      .attr("data-region", topRegion)
      .attr("cx", cx).attr("cy", cy).attr("r", r)
      .attr("fill", col).attr("stroke", col);
  });
}

/* ── link layer ──────────────────────────────────────────────────────────── */
const linkSel = root.append("g")
  .selectAll("path").data(LINKS).join("path")
  .attr("class","link")
  .attr("stroke", d => COLORS[d.region]||"#999")
  .attr("stroke-width", 2);

/* ── node layer ──────────────────────────────────────────────────────────── */
const nodeSel = root.append("g")
  .selectAll(".ngrp").data(NODES).join("g").attr("class","ngrp")
  .call(d3.drag()
    .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on("end",  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on("click",     nodeClick)
  .on("mouseover", showTip)
  .on("mousemove", moveTip)
  .on("mouseout",  hideTip);

nodeSel.append("circle")
  .attr("r",            nr)
  .attr("fill",         d => COLORS[d.region]||"#999")
  .attr("stroke",       d => d3.color(COLORS[d.region]||"#999").darker(.55))
  .attr("fill-opacity", .9);

nodeSel.append("text")
  .text(d => d.id)
  .attr("text-anchor","middle")
  .attr("y", d => nr(d)+9)
  .attr("fill","#222").attr("fill-opacity",.85)
  .style("font-size","8.5px")
  .style("paint-order","stroke")
  .style("stroke","#f0ede6")
  .style("stroke-width","2.5px")
  .style("stroke-linejoin","round");

/* ── tooltip ─────────────────────────────────────────────────────────────── */
const tip = document.getElementById("tip");
function showTip(e,d){
  const reg = d.region.replace(/([A-Z])/g," $1").trim();
  tip.innerHTML=`<b>${d.id}</b><span>${reg} · ${d.degree} joking relation${d.degree!==1?"s":""}</span>`;
  tip.style.display="block";
}
function moveTip(e){ tip.style.left=(e.offsetX+16)+"px"; tip.style.top=(e.offsetY-42)+"px"; }
function hideTip(){ tip.style.display="none"; }

/* ── click highlight ─────────────────────────────────────────────────────── */
let sel = null;
function sid(l){ return typeof l.source==="object"?l.source.id:l.source; }
function tid(l){ return typeof l.target==="object"?l.target.id:l.target; }
function neighbors(id){
  const s=new Set();
  LINKS.forEach(l=>{ if(sid(l)===id)s.add(tid(l)); if(tid(l)===id)s.add(sid(l)); });
  return s;
}
function nodeClick(e,d){
  e.stopPropagation();
  if(sel===d.id){ clearSel(); return; }
  sel=d.id;
  const nbrs=neighbors(d.id);
  nodeSel.classed("dim",n=>n.id!==d.id&&!nbrs.has(n.id));
  linkSel.classed("dim",l=>sid(l)!==d.id&&tid(l)!==d.id)
         .classed("lit",l=>sid(l)===d.id||tid(l)===d.id);
}
svg.on("click",clearSel);
function clearSel(){
  sel=null;
  nodeSel.classed("dim",false);
  linkSel.classed("dim",false).classed("lit",false);
  refreshVis();
}

/* ── region visibility ───────────────────────────────────────────────────── */
function refreshVis(){
  const visN=new Set();
  LINKS.forEach(l=>{ if(active.has(l.region)){ visN.add(sid(l)); visN.add(tid(l)); }});
  linkSel.style("display", d => active.has(d.region) ? null : "none");
  nodeSel.style("display", d => visN.has(d.id)       ? null : "none");
  /* hide zone ellipses, zone labels, and cluster hulls for inactive regions */
  zoneLayer.selectAll("[data-region]")
    .style("display", function(){ return active.has(d3.select(this).attr("data-region")) ? null : "none"; });
  hullLayer.selectAll("[data-region]")
    .style("display", function(){ return active.has(d3.select(this).attr("data-region")) ? null : "none"; });
}

/* ── force simulation ────────────────────────────────────────────────────── */
const sim = d3.forceSimulation(NODES)
  .force("link",    d3.forceLink(LINKS).id(d=>d.id).distance(44).strength(.55))
  .force("charge",  d3.forceManyBody().strength(-60))
  .force("collide", d3.forceCollide().radius(d=>nr(d)+10))
  .force("x",       d3.forceX(d=>compCentroids[d.component][0]).strength(.70))
  .force("y",       d3.forceY(d=>compCentroids[d.component][1]).strength(.70));

/* ── tick ────────────────────────────────────────────────────────────────── */
let tickN=0;
sim.on("tick",()=>{
  tickN++;
  linkSel.each(function(d){ redrawLink(this, d); });
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
  if(tickN%25===0) updateHulls();
});
sim.on("end", updateHulls);

/* ── resize ──────────────────────────────────────────────────────────────── */
window.addEventListener("resize",()=>{
  W=wrap.clientWidth; H=wrap.clientHeight;
  packAll();
  drawZones();
  sim
    .force("x",d3.forceX(d=>compCentroids[d.component][0]).strength(.70))
    .force("y",d3.forceY(d=>compCentroids[d.component][1]).strength(.70))
    .alpha(.6).restart();
  updateHulls();
});
</script>
</body>
</html>
